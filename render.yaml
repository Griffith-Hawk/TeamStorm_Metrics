
# Render.com — Blueprint для деплоя storm_stat
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: storm-stat
    runtime: node
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: STORM_SESSION_TOKEN
        sync: false
      - key: STORM_API_TOKEN
        sync: false
      - key: PORT
        value: 3000
