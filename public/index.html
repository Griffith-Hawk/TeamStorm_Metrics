<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проекты Storm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #388bfd33;
      --border: #30363d;
      --success: #3fb950;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Manrope', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .container:has(.workitems-table-wrap) { max-width: 100%; padding-left: 1rem; padding-right: 1rem; }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }

    .search::placeholder {
      color: var(--text-muted);
    }

    .search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .count {
      display: inline-flex;
      align-items: center;
      padding: 0.4rem 0.8rem;
      background: var(--surface);
      border-radius: var(--radius);
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .project-card {
      cursor: pointer;
    }

    .project-card:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .project-key {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .project-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.4rem;
      line-height: 1.35;
    }

    .project-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.5);
      border-radius: var(--radius);
      padding: 1.25rem;
      color: #f85149;
    }

    .error strong { display: block; margin-bottom: 0.5rem; }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); }

    a.storm-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    a.storm-link:hover { text-decoration: underline; }
    a.storm-link { pointer-events: auto; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { color: var(--text-muted); }

    .folders-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .folder-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: background 0.15s, border-color 0.15s;
    }
    .folder-item:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }
    .folder-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .folder-name { font-weight: 500; }
    .folder-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.2rem; }
    .folder-item { cursor: pointer; }
    .sprint-item { cursor: pointer; }
    .sprints-section { margin-bottom: 1.5rem; }
    .sprints-section h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .workitems-table-wrap { position: relative; overflow: auto; max-height: min(70vh, 600px); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; }
    .table-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; background: rgba(15, 20, 25, 0.85); z-index: 10; border-radius: var(--radius); color: var(--text-muted); font-size: 0.9rem; }
    .table-loader.hidden { display: none; }
    .table-loader::before { content: ''; width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: table-loader-spin 0.8s linear infinite; }
    @keyframes table-loader-spin { to { transform: rotate(360deg); } }
    .workitems-table { min-width: 1200px; width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: auto; }
    .workitems-table thead th { position: sticky; top: 0; z-index: 2; background: var(--surface); box-shadow: 0 2px 0 var(--border); }
    .workitems-table th { text-align: left; padding: 0.35rem 0.45rem; background: var(--surface); color: var(--text-muted); font-weight: 500; font-size: 0.68rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .workitems-table th.sortable { cursor: pointer; user-select: none; }
    .workitems-table th.sortable:hover { color: var(--accent); }
    .workitems-table th .sort-ind { margin-left: 0.2rem; opacity: 0.5; font-size: 0.6rem; }
    .workitems-table th.sort-asc .sort-ind, .workitems-table th.sort-desc .sort-ind { opacity: 1; }
    .workitems-table td { padding: 0.35rem 0.45rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    .workitems-table tr:hover td { background: var(--surface-hover); }
    .workitems-table .workitem-key { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent); white-space: nowrap; }
    .workitems-table .workitem-name { font-weight: 500; word-wrap: break-word; overflow-wrap: break-word; min-width: 120px; max-width: 280px; }
    .workitems-table .workitem-time { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--success); white-space: nowrap; }
    .workitems-table tr.wi-parent { background: rgba(88, 166, 255, 0.06); }
    .workitems-table tr.wi-parent td { border-top: 1px solid var(--border); }
    .workitems-table tbody tr.wi-parent:first-child td { border-top: none; }
    .workitems-table tr.wi-child td { background: var(--bg); }
    .workitems-table tr.wi-child .wi-child-marker { color: var(--text-muted); font-size: 0.8em; margin-right: 0.35rem; }
    .workitems-table .wi-parent-badge { font-size: 0.65rem; padding: 0.1rem 0.35rem; background: var(--accent-dim); color: var(--accent); border-radius: 4px; margin-left: 0.2rem; }
    .workitems-table .wi-cb-col { width: 2rem; min-width: 2rem; text-align: center; }
    .workitems-table th:nth-child(2), .workitems-table td:nth-child(2) { min-width: 60px; }
    .workitems-table th:nth-child(3), .workitems-table td:nth-child(3) { min-width: 120px; }
    .workitems-table th:nth-child(4), .workitems-table td:nth-child(4) { min-width: 50px; }
    .workitems-table th:nth-child(5), .workitems-table td:nth-child(5) { min-width: 70px; }
    .workitems-table th:nth-child(6), .workitems-table td:nth-child(6) { min-width: 90px; }
    .workitems-table th:nth-child(7), .workitems-table td:nth-child(7) { min-width: 90px; }
    .workitems-table th:nth-child(8), .workitems-table td:nth-child(8),
    .workitems-table th:nth-child(9), .workitems-table td:nth-child(9),
    .workitems-table th:nth-child(10), .workitems-table td:nth-child(10) { min-width: 38px; }
    .workitems-table th:nth-child(11), .workitems-table td:nth-child(11),
    .workitems-table th:nth-child(12), .workitems-table td:nth-child(12),
    .workitems-table th:nth-child(13), .workitems-table td:nth-child(13),
    .workitems-table th:nth-child(14), .workitems-table td:nth-child(14),
    .workitems-table th:nth-child(15), .workitems-table td:nth-child(15),
    .workitems-table th:nth-child(16), .workitems-table td:nth-child(16) { min-width: 48px; }
    .workitems-table th:nth-child(17), .workitems-table td:nth-child(17) { min-width: 90px; }
    .workitems-table .wi-no-est { color: var(--text-muted); font-size: 0.85rem; }
    .wi-status-green { color: var(--success) !important; font-weight: 500; }
    .wi-status-blue { color: var(--accent) !important; }
    .wi-status-gray { color: var(--text-muted) !important; }
    .push-toolbar { margin-bottom: 0.75rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; }
    .push-toolbar .filter-input { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font: inherit; min-width: 140px; }
    .push-toolbar .filter-select { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font: inherit; min-width: 140px; }
    .push-btn { padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius); font-weight: 500; cursor: pointer; font-family: inherit; }
    .push-btn:hover:not(:disabled) { filter: brightness(1.1); }
    .push-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .push-status { font-size: 0.85rem; color: var(--text-muted); }
    .release-stats { margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--surface); border-radius: var(--radius); font-size: 0.9rem; color: var(--text-muted); }
    .area-summary { margin-bottom: 1.25rem; padding: 1.25rem; background: var(--surface); border-radius: var(--radius); font-size: 0.9rem; border: 1px solid var(--border); }
    .area-summary h3 { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .area-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .area-row { display: flex; flex-direction: column; gap: 0.5rem; padding: 1rem; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); min-width: 0; }
    .area-row .area-name { font-weight: 600; color: var(--accent); font-size: 1rem; margin-bottom: 0.25rem; }
    .area-row .area-desc { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block; }
    .area-row .area-inputs { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.25rem; }
    .area-row .area-inputs label { font-size: 0.85rem; color: var(--text-muted); }
    .area-row .area-inputs input { width: 4rem; padding: 0.3rem 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; }
    .area-row .area-days { color: var(--text-muted); font-size: 0.85rem; }
    .area-row .area-line { font-size: 0.82rem; color: var(--text-muted); }
    .area-row .area-acceptance-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.2rem; }
    .area-row .area-acceptance-row span { font-size: 0.8rem; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 0.5rem; }
    .summary-table th { text-align: left; font-weight: 500; color: var(--text-muted); font-size: 0.8rem; padding: 0.35rem 0.5rem 0.35rem 0; border-bottom: 1px solid var(--border); }
    .summary-table td { padding: 0.35rem 0.5rem 0.35rem 0; border-bottom: 1px solid rgba(48, 54, 61, 0.5); }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table .sum-label { color: var(--text-muted); font-size: 0.85rem; }
    .summary-table .sum-value { font-family: 'JetBrains Mono', monospace; }
    .summary-table td.sum-plan { color: var(--text-muted); font-weight: 500; }
    .summary-table td.sum-fact { color: var(--success); font-weight: 700; }
    .summary-table .sum-diff { color: var(--accent); font-weight: 700; }
    .summary-total { padding: 1.25rem; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); max-width: 520px; }
    .summary-total .summary-table { margin-top: 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Проекты Storm</h1>
      <p class="subtitle">Список workspace из storm.alabuga.space</p>
    </header>

    <div class="toolbar" id="toolbar" style="display: none;">
      <input type="text" class="search" id="search" placeholder="Поиск по названию, ключу, описанию...">
      <span class="count" id="count">0 проектов</span>
    </div>

    <div id="content">
      <div class="loading" id="loading">Загрузка проектов</div>
    </div>
  </div>

  <script>
    const API = '/api/workspaces';
    let allWorkspaces = [];

    async function loadProjects() {
      const content = document.getElementById('content');
      const loading = document.getElementById('loading');
      const toolbar = document.getElementById('toolbar');

      try {
        const res = await fetch(API);
        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error('Сервер вернул некорректный ответ. Проверьте, что backend запущен (npm start).');
        }
        if (!res.ok) {
          throw new Error(data.error || data.details || data.hint || `HTTP ${res.status}`);
        }

        const workspaces = data.workspaces || [];
        allWorkspaces = workspaces;
        loading.style.display = 'none';
        toolbar.style.display = 'flex';

        renderProjects(workspaces);
        setupSearch(workspaces);
      } catch (err) {
        loading.style.display = 'none';
        content.innerHTML = `
          <div class="error">
            <strong>Ошибка загрузки</strong>
            ${escapeHtml(err.message)}
            ${err.message.includes('token') ? '<br><small>Проверьте .env и STORM_SESSION_TOKEN</small>' : ''}
          </div>
        `;
      }
    }

    function renderProjects(workspaces, filter = '') {
      const content = document.getElementById('content');
      const countEl = document.getElementById('count');

      const q = filter.toLowerCase().trim();
      const filtered = q
        ? workspaces.filter(w =>
            (w.name || '').toLowerCase().includes(q) ||
            (w.key || '').toLowerCase().includes(q) ||
            (w.description || '').toLowerCase().includes(q)
          )
        : workspaces;

      countEl.textContent = `${filtered.length} из ${workspaces.length} проектов`;

      if (filtered.length === 0) {
        content.innerHTML = '<div class="empty">Ничего не найдено</div>';
        return;
      }

      content.innerHTML = `
        <div class="projects-grid">
          ${filtered.map(w => `
            <article class="project-card" data-workspace-id="${escapeHtml(w.workspaceId)}" data-workspace-name="${escapeHtml(w.name || '')}" data-workspace-key="${escapeHtml(w.key || '')}">
              <div class="project-key">${escapeHtml(w.key || '—')}</div>
              <div class="project-name">${escapeHtml(w.name || 'Без названия')}</div>
              ${w.description ? `<div class="project-desc">${escapeHtml(w.description)}</div>` : ''}
              <div class="project-meta">
                ${(w.modules || []).map(m => `<span class="badge">${escapeHtml(m)}</span>`).join('')}
              </div>
              <a href="https://storm.alabuga.space/${w.workspaceId}" target="_blank" rel="noopener" class="storm-link" onclick="event.stopPropagation()">
                Открыть в Storm →
              </a>
            </article>
          `).join('')}
        </div>
      `;
      content.querySelectorAll('.project-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.workspaceId;
          const name = card.dataset.workspaceName || 'Проект';
          const key = card.dataset.workspaceKey || '';
          openWorkspaceFolders({ workspaceId: id, name, key });
        });
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function setupSearch(workspaces) {
      const search = document.getElementById('search');
      search.addEventListener('input', () => {
        renderProjects(workspaces, search.value);
      });
    }

    async function openWorkspaceFolders(workspace) {
      const content = document.getElementById('content');
      const toolbar = document.getElementById('toolbar');
      toolbar.style.display = 'none';

      content.innerHTML = `
        <div class="breadcrumb">
          <a href="#" id="back-link">← Проекты</a>
          <span>/</span>
          <span>${escapeHtml(workspace.name)} (${escapeHtml(workspace.key)})</span>
        </div>
        <div class="loading" id="folders-loading">Загрузка папок</div>
        <div id="folders-container" style="display:none;"></div>
      `;

      document.getElementById('back-link').addEventListener('click', (e) => {
        e.preventDefault();
        toolbar.style.display = 'flex';
        renderProjects(allWorkspaces, document.getElementById('search').value);
        setupSearch(allWorkspaces);
      });

      try {
        const res = await fetch(`/api/workspaces/${encodeURIComponent(workspace.workspaceId)}/folders`);
        let data;
        try {
          data = await res.json();
        } catch {
          document.getElementById('folders-loading').style.display = 'none';
          content.insertAdjacentHTML('beforeend', `
            <div class="error">
              <strong>Ошибка</strong>
              Сервер вернул некорректный ответ. Возможно, сессия Storm истекла — обновите токены в .env
            </div>
          `);
          return;
        }
        document.getElementById('folders-loading').style.display = 'none';

        if (!res.ok) {
          content.insertAdjacentHTML('beforeend', `
            <div class="error">
              <strong>Ошибка загрузки папок</strong>
              ${escapeHtml(data.error || data.details || `HTTP ${res.status}`)}
              ${data.hint ? '<br><small>' + escapeHtml(data.hint) + '</small>' : ''}
            </div>
          `);
          return;
        }

        const items = data.items || [];
        const container = document.getElementById('folders-container');
        container.style.display = 'block';
        container.innerHTML = `
          <h2 style="margin-bottom:1rem;font-size:1.1rem;">Папки пространства</h2>
          ${items.length === 0
            ? '<div class="empty">В этом пространстве нет папок</div>'
            : `<div class="folders-list">
                ${items.map(f => `
                  <div class="folder-item" data-folder-id="${escapeHtml(f.id)}" data-folder-name="${escapeHtml(f.name || 'Папка')}">
                    <div class="folder-icon">📁</div>
                    <div>
                      <div class="folder-name">${escapeHtml(f.name || 'Без названия')}</div>
                      ${f.description ? `<div class="folder-desc">${escapeHtml(f.description)}</div>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>`
          }
        `;
        container.querySelectorAll('.folder-item').forEach(el => {
          el.addEventListener('click', () => {
            openFolderSprints(workspace, { id: el.dataset.folderId, name: el.dataset.folderName });
          });
        });
      } catch (err) {
        const loadingEl = document.getElementById('folders-loading');
        if (loadingEl) loadingEl.style.display = 'none';
        content.insertAdjacentHTML('beforeend', `
          <div class="error">
            <strong>Ошибка</strong>
            ${escapeHtml(err.message)}
          </div>
        `);
      }
    }

    async function openFolderSprints(workspace, folder) {
      const content = document.getElementById('content');
      const toolbar = document.getElementById('toolbar');
      toolbar.style.display = 'none';

      content.innerHTML = `
        <div class="breadcrumb">
          <a href="#" id="back-to-projects">← Проекты</a>
          <span>/</span>
          <a href="#" id="back-to-folders">${escapeHtml(workspace.name)}</a>
          <span>/</span>
          <span>${escapeHtml(folder.name)}</span>
        </div>
        <div class="loading" id="sprints-loading">Загрузка релизов</div>
        <div id="sprints-container" style="display:none;"></div>
      `;

      document.getElementById('back-to-projects').addEventListener('click', (e) => {
        e.preventDefault();

            selectAllCb.checked = selectables.length > 0 && checked.length === selectables.length;
            selectAllCb.indeterminate = checked.length > 0 && checked.length < selectables.length;
          }
        }

        function setupCheckboxes() {
          if (!tbody) return;
          tbody.addEventListener('change', (e) => {
            const cb = e.target.closest('.wi-select-cb');
            if (!cb) return;
            const id = cb.dataset.workitemId;
            if (cb.checked) selectedWorkitemIds.add(id);
            else selectedWorkitemIds.delete(id);
            updatePushBtnState();
          });
        }

        if (selectAllCb && tbody) {
          selectAllCb.addEventListener('change', () => {
            const checked = selectAllCb.checked;
            tbody.querySelectorAll('.wi-select-cb').forEach(cb => {
              cb.checked = checked;
              const id = cb.dataset.workitemId;
              if (checked) selectedWorkitemIds.add(id);
              else selectedWorkitemIds.delete(id);
            });
            updatePushBtnState();
          });
        }

        if (pushBtn) {
          pushBtn.addEventListener('click', async () => {
            if (selectedWorkitemIds.size === 0) return;
            const cr = parseInt(crInput?.value || '0', 10) || 0;
            const bug = parseInt(bugInput?.value || '0', 10) || 0;
            pushBtn.disabled = true;
            pushStatus.textContent = 'Отправка…';
            let ok = 0, err = 0;
            for (const wid of Array.from(selectedWorkitemIds)) {
              const w = byId[wid];
              if (!w) { err++; continue; }
              const calc = getEstimateForPush(w, cr, bug);
              if (calc == null || calc <= 0) { err++; continue; }
              try {
                const folderId = folder?.id || folder?.folderId;
                let url = '/api/workspaces/' + encodeURIComponent(workspace.workspaceId) + '/workitems/' + encodeURIComponent(wid);
                if (folderId) url += '?folderId=' + encodeURIComponent(folderId);
                const res = await fetch(url, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ originalEstimate: Math.round(calc) })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) { ok++; selectedWorkitemIds.delete(wid); } else { err++; }
              } catch { err++; }
            }
            pushStatus.textContent = ok > 0 ? 'Перенесено: ' + ok + (err > 0 ? ', ошибок: ' + err : '') : (err > 0 ? 'Ошибок: ' + err : '');
            refreshTable();
          });
        }

        function fmtDiff(planSec, sumSec) {
          const diffSec = (planSec || 0) - (sumSec || 0);
          if (diffSec === 0) return '0';
          const sign = diffSec > 0 ? '+' : '−';
          return sign + secToHoursFmt(Math.abs(diffSec)) + ', ' + sign + secToDaysFmt(Math.abs(diffSec));
        }
        function refreshTotalSummary(cr, bug) {
          const { planAll, planNoAcc, factAll, factNoAcc } = getTotalSums(cr, bug, factCache);
          const set = (id, t) => { const el = document.getElementById(id); if (el) el.textContent = t; };
          set('total-plan-all', secToHoursFmt(Math.round(planAll)));
          set('total-plan-noacc', secToHoursFmt(Math.round(planNoAcc)));
          set('total-fact-all', secToHoursFmt(Math.round(factAll)));
          set('total-fact-noacc', secToHoursFmt(Math.round(factNoAcc)));
          set('total-diff-all', fmtDiff(Math.round(planAll), Math.round(factAll)));
          set('total-diff-noacc', fmtDiff(Math.round(planNoAcc), Math.round(factNoAcc)));
        }
        function refreshAreaSummary(cr, bug) {
          const areaSumsAll = getAreaSums(cr, bug, true);
          const areaSumsNoAcc = getAreaSums(cr, bug, false);
          const areaFactAll = getAreaFactSums(true, factCache);
          const areaFactNoAcc = getAreaFactSums(false, factCache);
          const qaSums = getTotalQASums(factCache);
          const handoffSums = getTotalHandoffSums(factCache);
          const set = (id, t) => { const el = document.getElementById(id); if (el) el.textContent = t; };
          AREA_ORDER.forEach(area => {
            const sumAll = Math.round(areaSumsAll[area] || 0);
            const sumNoAcc = Math.round(areaSumsNoAcc[area] || 0);
            const factAll = Math.round(areaFactAll[area] || 0);
            const factNoAcc = Math.round(areaFactNoAcc[area] || 0);
            set('area-' + area + '-sum-all', secToHoursFmt(sumAll));
            set('area-' + area + '-sum-noacc', secToHoursFmt(sumNoAcc));
            set('area-' + area + '-fact-all', secToHoursFmt(factAll));
            set('area-' + area + '-fact-noacc', secToHoursFmt(factNoAcc));
            set('area-' + area + '-diff-all', fmtDiff(sumAll, factAll));
            set('area-' + area + '-diff-noacc', fmtDiff(sumNoAcc, factNoAcc));
            const daysEl = document.getElementById('area-' + area + '-days');
            const hInput = document.getElementById('area-' + area + '-h');
            if (daysEl) daysEl.textContent = hInput?.value ? (parseFloat(hInput.value) / HOURS_PER_DAY).toFixed(1) + ' д' : '—';
          });
          const qaEstAll = Math.round(qaSums.estQAAll);
          const qaEstNoAcc = Math.round(qaSums.estQANoAcc);
          const qaFactAll = Math.round(qaSums.factQAAll);
          const qaFactNoAcc = Math.round(qaSums.factQANoAcc);
          set('area-qa-sum-all', secToHoursFmt(qaEstAll));
          set('area-qa-sum-noacc', secToHoursFmt(qaEstNoAcc));
          set('area-qa-fact-all', secToHoursFmt(qaFactAll));
          set('area-qa-fact-noacc', secToHoursFmt(qaFactNoAcc));
          set('area-qa-diff-all', fmtDiff(qaEstAll, qaFactAll));
          set('area-qa-diff-noacc', fmtDiff(qaEstNoAcc, qaFactNoAcc));
          set('area-handoff-fact-all', secToHoursFmt(Math.round(handoffSums.handoffAll)));
          set('area-handoff-fact-noacc', secToHoursFmt(Math.round(handoffSums.handoffNoAcc)));
        }
        function refreshAssigneeSummary(cr, bug) {
          const { sums: sumsAll, names, order } = getAssigneeSums(cr, bug, true);
          const { sums: sumsNoAcc } = getAssigneeSums(cr, bug, false);
          const { sums: factAll } = getAssigneeFactSums(true, factCache);
          const { sums: factNoAcc } = getAssigneeFactSums(false, factCache);
          const safeId = (aid) => aid.replace(/[^a-zA-Z0-9_-]/g, '_');
          order.forEach(aid => {
            const sid = safeId(aid);
            const sumAll = Math.round(sumsAll[aid] || 0);
            const sumNoAcc = Math.round(sumsNoAcc[aid] || 0);
            const factAllSec = Math.round(factAll[aid] || 0);
            const factNoAccSec = Math.round(factNoAcc[aid] || 0);
            const sumAllEl = document.getElementById('assignee-' + sid + '-sum-all');
            const sumNoAccEl = document.getElementById('assignee-' + sid + '-sum-noacc');
            if (sumAllEl) sumAllEl.textContent = secToHoursFmt(sumAll);
            if (sumNoAccEl) sumNoAccEl.textContent = secToHoursFmt(sumNoAcc);
            const factAllEl = document.getElementById('assignee-' + sid + '-fact-all');
            const factNoAccEl = document.getElementById('assignee-' + sid + '-fact-noacc');
            if (factAllEl) factAllEl.textContent = secToHoursFmt(factAllSec);
            if (factNoAccEl) factNoAccEl.textContent = secToHoursFmt(factNoAccSec);
            const hInput = document.getElementById('assignee-' + sid + '-h');
            const daysEl = document.getElementById('assignee-' + sid + '-days');
            if (daysEl) daysEl.textContent = hInput?.value ? (parseFloat(hInput.value) / HOURS_PER_DAY).toFixed(1) + ' д' : '—';
            const diffAllEl = document.getElementById('assignee-' + sid + '-diff-all');
            const diffNoAccEl = document.getElementById('assignee-' + sid + '-diff-noacc');
            if (diffAllEl) diffAllEl.textContent = fmtDiff(sumAll, factAllSec);
            if (diffNoAccEl) diffNoAccEl.textContent = fmtDiff(sumNoAcc, factNoAccSec);
          });
        }
        function refreshTestingBySummary() {
          const { estQA: estAll, factQA: factAll, names, order } = getTestingByQASums(true, factCache);
          const { estQA: estNoAcc, factQA: factNoAcc } = getTestingByQASums(false, factCache);
          const safeId = (tid) => tid.replace(/[^a-zA-Z0-9_-]/g, '_');
          order.forEach(tid => {
            const sid = safeId(tid);
            const planAll = Math.round(estAll[tid] || 0);
            const planNoAcc = Math.round(estNoAcc[tid] || 0);
            const factAllSec = Math.round(factAll[tid] || 0);
            const factNoAccSec = Math.round(factNoAcc[tid] || 0);
            const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
            set('testingby-' + sid + '-sum-all', secToHoursFmt(planAll));
            set('testingby-' + sid + '-sum-noacc', secToHoursFmt(planNoAcc));
            set('testingby-' + sid + '-fact-all', secToHoursFmt(factAllSec));
            set('testingby-' + sid + '-fact-noacc', secToHoursFmt(factNoAccSec));
            set('testingby-' + sid + '-diff-all', fmtDiff(planAll, factAllSec));
            set('testingby-' + sid + '-diff-noacc', fmtDiff(planNoAcc, factNoAccSec));
          });
        }

        function setupAreaInputs() {
          AREA_ORDER.forEach(area => {
            const hInput = document.getElementById('area-' + area + '-h');
            const manualEl = document.getElementById('area-' + area + '-manual');
            const syncManual = () => {
              const h = hInput?.value ? parseFloat(hInput.value) : '';
              const d = h !== '' ? (h / HOURS_PER_DAY).toFixed(1) : '';
              if (manualEl) manualEl.textContent = h !== '' ? h + ' ч' + (d ? ', ' + d + ' д' : '') : '—';
              if (h !== '') localStorage.setItem(storageKey + '_area_' + area + '_h', String(h));
              else localStorage.removeItem(storageKey + '_area_' + area + '_h');
              const cr = parseInt(document.getElementById('cr-pct')?.value || '0', 10) || 0;
              const bug = parseInt(document.getElementById('bug-pct')?.value || '0', 10) || 0;
              refreshAreaSummary(cr, bug);
              refreshAssigneeSummary(cr, bug);
            };
            if (hInput) hInput.oninput = syncManual;
            syncManual();
          });
        }
        function setupAssigneeInputs() {
          const { order } = getAssigneeSums(parseInt(document.getElementById('cr-pct')?.value || '0', 10) || 0, parseInt(document.getElementById('bug-pct')?.value || '0', 10) || 0);
          const safeId = (aid) => aid.replace(/[^a-zA-Z0-9_-]/g, '_');
          order.forEach(aid => {
            const sid = safeId(aid);
            const hInput = document.getElementById('assignee-' + sid + '-h');
            const manualEl = document.getElementById('assignee-' + sid + '-manual');
            const syncManual = () => {
              const h = hInput?.value ? parseFloat(hInput.value) : '';
              const d = h !== '' ? (h / HOURS_PER_DAY).toFixed(1) : '';
              if (manualEl) manualEl.textContent = h !== '' ? h + ' ч' + (d ? ', ' + d + ' д' : '') : '—';
              if (h !== '') localStorage.setItem(storageKey + '_assignee_' + aid + '_h', String(h));
              else localStorage.removeItem(storageKey + '_assignee_' + aid + '_h');
              const cr = parseInt(document.getElementById('cr-pct')?.value || '0', 10) || 0;
              const bug = parseInt(document.getElementById('bug-pct')?.value || '0', 10) || 0;
              refreshAreaSummary(cr, bug);
              refreshAssigneeSummary(cr, bug);
            };
            if (hInput) hInput.oninput = syncManual;
            syncManual();
          });
        }

        function refreshTable() {
          if (!tbody) return;
          const cr = parseInt(crInput?.value || '0', 10) || 0;
          const bug = parseInt(bugInput?.value || '0', 10) || 0;
          tbody.innerHTML = buildTableBody(cr, bug, workitemSearchQ, workitemAssigneeFilter, workitemAreaFilter, workitemTestingByFilter, sortCol, sortDir);
          applyFactCache();
          refreshTotalSummary(cr, bug);
          refreshAreaSummary(cr, bug);
          refreshAssigneeSummary(cr, bug);
          refreshTestingBySummary();
          updatePushBtnState();
          setupCheckboxes();
          updateSortHeaders();
        }
        function updateSortHeaders() {
          if (!thead) return;
          thead.querySelectorAll('th.sortable').forEach(th => {
            const col = th.dataset.sort;
            th.classList.remove('sort-asc', 'sort-desc');
            th.querySelector('.sort-ind').textContent = '';
            if (col === sortCol) {
              th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
              th.querySelector('.sort-ind').textContent = sortDir === 'asc' ? '↑' : '↓';
            }
          });
        }
        if (thead) {
          thead.addEventListener('click', (e) => {
            const th = e.target.closest('th.sortable');
            if (!th) return;
            const col = th.dataset.sort;
            if (!col) return;
            sortDir = (sortCol === col && sortDir === 'asc') ? 'desc' : 'asc';
            sortCol = col;
            refreshTable();
          });
        }
        if (crInput && bugInput && tbody) {
          const update = () => {
            const cr = parseInt(crInput.value, 10) || 0;
            const bug = parseInt(bugInput.value, 10) || 0;
            localStorage.setItem(storageKey + '_cr', cr);
            localStorage.setItem(storageKey + '_bug', bug);
            refreshTable();
          };
          crInput.oninput = bugInput.oninput = update;
        }
        if (wiSearchInput && tbody && crInput && bugInput) {
          wiSearchInput.addEventListener('input', () => {
            workitemSearchQ = wiSearchInput.value || '';
            refreshTable();
          });
        }
        if (wiAssigneeFilter && tbody) {
          wiAssigneeFilter.addEventListener('change', () => {
            workitemAssigneeFilter = wiAssigneeFilter.value || '__all__';
            refreshTable();
          });
        }
        if (wiAreaFilter && tbody) {
          wiAreaFilter.addEventListener('change', () => {
            workitemAreaFilter = wiAreaFilter.value || '__all__';
            refreshTable();
          });
        }
        if (wiTestingByFilter && tbody) {
          wiTestingByFilter.addEventListener('change', () => {
            const v = wiTestingByFilter.value;
            workitemTestingByFilter = (v && v !== '__all__') ? v : '__all__';
            refreshTable();
          });
        }

        refreshTotalSummary(codeReviewPct, bugPotentialPct);
        refreshAreaSummary(codeReviewPct, bugPotentialPct);
        refreshAssigneeSummary(codeReviewPct, bugPotentialPct);
        setupAreaInputs();
        setupAssigneeInputs();
        updatePushBtnState();
        setupCheckboxes();
      } catch (err) {
        document.getElementById('workitems-loading').style.display = 'none';
        content.insertAdjacentHTML('beforeend', '<div class="error"><strong>Ошибка</strong> ' + escapeHtml(err.message) + '</div>');
      }
    }

    loadProjects();
  </script>
</body>
</html>
